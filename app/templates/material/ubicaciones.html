{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-2">
  <h5 class="mb-0 text-uppercase text-secondary">Espacios del centro</h5>

  <button class="btn btn-outline-primary" id="toggle-edicion-ubicaciones">
    <i class="bi bi-pencil"></i> Activar edición
  </button>
</div>

<p class="text-muted">
  Mostrando todos los espacios del centro ({{ ubicaciones|length }} ubicaciones)
</p>

<table class="table table-sm table-hover align-middle">
  <thead class="table-light">
    <tr>
      <th>Tipo</th>
      <th>Nombre</th>
      <th>Puerta</th>
      <th>Planta</th>
      <th>Observaciones</th>
    </tr>
  </thead>
  <tbody>
    {% for u in ubicaciones %}
    <tr data-id="{{ u.id }}">
      <td><input class="form-control form-control-sm" name="tipo" value="{{ u.tipo or '' }}" disabled></td>
      <td><input class="form-control form-control-sm" name="nombre" value="{{ u.nombre or '' }}" disabled></td>
      <td><input class="form-control form-control-sm" name="numero_puerta" value="{{ u.numero_puerta or '' }}" disabled></td>
      <td><input class="form-control form-control-sm" name="planta" value="{{ u.planta or '' }}" disabled></td>
      <td><input class="form-control form-control-sm" name="observaciones" value="{{ u.observaciones or '' }}" disabled></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}

{% block scripts %}
<script>
console.log("TEMPLATE NUEVO DE UBICACIONES CARGADO");
console.log("URL GUARDADO:", "{{ url_for('main.guardar_cambios_ubicaciones') }}");

let modoEdicionUbicaciones = false;

document.addEventListener('DOMContentLoaded', () => {
  const boton = document.getElementById('toggle-edicion-ubicaciones');
  if (!boton) return;

  boton.addEventListener('click', () => {
    modoEdicionUbicaciones = !modoEdicionUbicaciones;

    const inputs = document.querySelectorAll('tr[data-id] input');
    inputs.forEach(input => {
      input.disabled = !modoEdicionUbicaciones;
    });

    boton.innerHTML = modoEdicionUbicaciones
      ? '<i class="bi bi-check2"></i> Guardar cambios'
      : '<i class="bi bi-pencil"></i> Activar edición';

    if (!modoEdicionUbicaciones) {
      const ubicacionesData = [];

      document.querySelectorAll('tr[data-id]').forEach(tr => {
        const data = { id: tr.dataset.id };

        tr.querySelectorAll('input').forEach(input => {
          data[input.name] = input.value;
        });

        ubicacionesData.push(data);
      });

      const url = "{{ url_for('main.guardar_cambios_ubicaciones') }}";
      console.log("ENVIANDO A:", url);

      fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(ubicacionesData)
      })
      .then(async response => {
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Error al guardar los cambios");
        }

        return data;
      })
      .then(data => {
        if (!data.success) {
          alert(data.error || "Error al guardar los cambios");
        }
      })
      .catch(error => {
        console.error("Error guardando ubicaciones:", error);
        alert(error.message || "Error en la petición");
      });
    }
  });
});
</script>
{% endblock %}
