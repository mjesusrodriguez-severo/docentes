{% extends "base.html" %}

{% block content %}
<div class="container mt-4" style="max-width: 800px;">

  <h4 class="mb-3 text-uppercase text-secondary">
    ➕ Nuevo dispositivo
  </h4>

  <form method="POST" class="card p-3 shadow-sm">

    <div class="row mb-2">
      <div class="col-md-6">
        <label class="form-label">Tipo</label>
        <select name="tipo" class="form-select" required>
          <option value="">Selecciona tipo</option>
          <option value="portatil">Portátil</option>
          <option value="tablet">Tablet</option>
          <option value="sobremesa">Sobremesa</option>
          <option value="allinone">All-in-one</option>
          <option value="pizarra">Pizarra digital</option>
          <option value="robotica">Robótica</option>
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">Nombre</label>
        <input type="text" name="nombre" class="form-control">
      </div>
    </div>

    <div class="row mb-2">
      <div class="col-md-6">
        <label class="form-label">Etiqueta</label>
        <input type="text" name="etiqueta" class="form-control">
      </div>

      <div class="col-md-6">
        <label class="form-label">Número de serie</label>
        <input type="text" name="numero_serie" class="form-control">
      </div>
    </div>

    <div class="row mb-2">
      <div class="col-md-6">
        <label class="form-label">Estado</label>
        <select name="estado" class="form-select">
          <option value="activo">Activo</option>
          <option value="incidencia">Incidencia</option>
          <option value="baja">Baja</option>
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">Ubicación</label>
        <select name="ubicacion_id" class="form-select">
          <option value="">Selecciona ubicación</option>
          {% for u in ubicaciones %}
            <option value="{{ u.id }}">
              {{ u.nombre }}{% if u.numero_puerta %} (Puerta {{ u.numero_puerta }}){% endif %}
            </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="row mb-2">
      <div class="col-md-6">
        <label class="form-label">Marca</label>
        <input type="text" name="marca" class="form-control">
      </div>

      <div class="col-md-6">
        <label class="form-label">Modelo</label>
        <input type="text" name="modelo" class="form-control">
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Observaciones</label>
      <textarea name="observaciones" class="form-control" rows="2"></textarea>
    </div>

    <div class="d-flex justify-content-between">
      <a href="{{ url_for('main.ver_inventario') }}" class="btn btn-secondary">
        ⬅ Volver
      </a>

      <button type="submit" class="btn btn-success">
        💾 Guardar dispositivo
      </button>
    </div>

  </form>
</div>
{% endblock %}
